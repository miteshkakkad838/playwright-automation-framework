name: Playwright Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm install
      
      - name: Fix Playwright Permissions
        run: chmod -R 755 node_modules

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Create .env file
        run: |
          echo "BASE_URL=https://dummyjson.com" >> .env
          echo "APP_USERNAME=emilys" >> .env
          echo "APP_PASSWORD=emilyspass" >> .env
          echo "STORE_URL=https://www.saucedemo.com" >> .env
          echo "STORE_USER=standard_user" >> .env
          echo "STORE_PASSWORD=secret_sauce" >> .env

      - name: Run Playwright Tests
        run: npx playwright test

      - name: Upload HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/